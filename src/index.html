<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fricon UPI - Production KPI Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="container-fluid">
    <!-- Header -->
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <span class="brand-icon">📊</span>
          Fricon UPI v4.0.0
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <button class="btn btn-light btn-sm" id="uploadBtn">📁 Upload Excel</button>
              <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display: none;">
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" data-export="excel">📥 Export Excel</button>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" data-export="csv">📥 Export CSV</button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="py-4">
      <!-- Dashboard Loading Indicator -->
      <div class="dashboard-loader" style="display: none;">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- KPI Cards -->
      <section class="mb-4">
        <div class="kpi-cards-container" id="kpiCardsContainer"></div>
      </section>

      <!-- Data Table -->
      <section class="mb-4">
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0">Production Data</h5>
          </div>
          <div class="card-body">
            <div id="data-table"></div>
          </div>
        </div>
      </section>

      <!-- Charts Section -->
      <section class="mb-4">
        <div class="row">
          <div class="col-lg-6">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Production Trend</h5>
              </div>
              <div class="card-body">
                <canvas id="productionChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Articles Distribution</h5>
              </div>
              <div class="card-body">
                <canvas id="articlesChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
